services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-campingai
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Pwd_12345!
      - MSSQL_PID=Developer
    ports:
      - "14333:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    networks:
      - campingai-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Pwd_12345!' -C -Q 'SELECT 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - campingai-network
    volumes:
      - ../CampingAI.Infra/0.CreateDatabase.sql:/scripts/0.CreateDatabase.sql:ro
    command: >
      bash -c "
        echo 'Esperando a que SQL Server esté listo...'
        sleep 15
        echo 'Ejecutando script de inicialización...'
        /opt/mssql-tools18/bin/sqlcmd -S sql-campingai -U sa -P 'Pwd_12345!' -C -i /scripts/0.CreateDatabase.sql
        if [ $? -eq 0 ]; then
          echo 'Script ejecutado exitosamente'
        else
          echo 'Error al ejecutar el script'
          exit 1
        fi
      "
    restart: "no"

  webapi:
    build:
      context: ../
      dockerfile: CampingAI.WebApi/Dockerfile
    container_name: campingai-webapi
    ports:
      - "32777:8080"
      - "32778:8081"
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080;https://+:8081
      - ASPNETCORE_Kestrel__Certificates__Default__Password=YourPassword123!
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ConnectionStrings__CAMPING_AI_SqlServer=Server=sql-campingai,1433;Database=CAMPING_AI_DB;User Id=sa;Password=Pwd_12345!;TrustServerCertificate=true;Encrypt=true;
      - Jwt__Issuer=CampingAI
      - Jwt__Audience=CampingAI-Users
      - Jwt__Key=CampingAI-SuperSecret-Key-Min32Chars!!
      - GoogleAuth__ClientId=REPLACE_WITH_GOOGLE_CLIENT_ID
      - GoogleAuth__ClientSecret=REPLACE_WITH_GOOGLE_CLIENT_SECRET
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - campingai-network
    volumes:
      - ./logs:/app/logs
      - ./https:/https
    init: true
    entrypoint: >
      sh -c "
          dotnet dev-certs https -ep /https/aspnetapp.pfx -p YourPassword123! --trust
          exec dotnet CampingAI.WebApi.dll
      "

volumes:
  sqlserver_data:

networks:
  campingai-network:
    driver: bridge