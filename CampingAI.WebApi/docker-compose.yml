services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-campingai
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Pwd_12345!
      - MSSQL_PID=Developer
    ports:
      - "14333:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped
    networks:
      - campingai-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Pwd_12345!' -C -Q 'SELECT 1'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - campingai-network
    volumes:
      - ../CampingAI.Infra/0.CreateDatabase.sql:/scripts/0.CreateDatabase.sql:ro
      - ../CampingAI.Infra/1.CreateCampingAITables.sql:/scripts/1.CreateCampingAITables.sql:ro
      - ../CampingAI.Infra/3.CreateLocationTables.sql:/scripts/3.CreateLocationTables.sql:ro
      - ../CampingAI.Infra/4.AlterCampingsProvinceId.sql:/scripts/4.AlterCampingsProvinceId.sql:ro
      - ../CampingAI.Infra/5.SeedFacilities.sql:/scripts/5.SeedFacilities.sql:ro
      - ../CampingAI.Infra/6.DropCampingsPiscinaColumn.sql:/scripts/6.DropCampingsPiscinaColumn.sql:ro
      - ../CampingAI.Infra/7.DropCampingsMascotasColumn.sql:/scripts/7.DropCampingsMascotasColumn.sql:ro
      - ../CampingAI.Infra/8.AddFavoritesUniqueConstraint.sql:/scripts/8.AddFavoritesUniqueConstraint.sql:ro
      - ../CampingAI.Infra/9.SeedSystemUser.sql:/scripts/9.SeedSystemUser.sql:ro
      - ../CampingAI.Infra/10.AddUserManagerStatus.sql:/scripts/10.AddUserManagerStatus.sql:ro
      - ../CampingAI.Infra/11.CreateCategoriesTables.sql:/scripts/11.CreateCategoriesTables.sql:ro
      - ../CampingAI.Infra/12.SeedCategories.sql:/scripts/12.SeedCategories.sql:ro
      - ../CampingAI.Infra/13.MigrateCampingCategoryToGuid.sql:/scripts/13.MigrateCampingCategoryToGuid.sql:ro
    command: >
      bash -c "
        echo 'Esperando a que SQL Server esté listo...'
        sleep 15
        run_script() {
          echo \"Ejecutando $1...\"
          /opt/mssql-tools18/bin/sqlcmd -S sql-campingai -U sa -P 'Pwd_12345!' -C -i \"/scripts/$1\"
          if [ \$? -ne 0 ]; then
            echo \"Error al ejecutar $1\"
            exit 1
          fi
          echo \"$1 ejecutado correctamente\"
        }
        run_script 0.CreateDatabase.sql
        run_script 1.CreateCampingAITables.sql
        run_script 2.AlterCampingsAddFilters.sql
        run_script 3.CreateLocationTables.sql
        run_script 4.AlterCampingsProvinceId.sql
        run_script 5.SeedFacilities.sql
        run_script 6.DropCampingsPiscinaColumn.sql
        run_script 7.DropCampingsMascotasColumn.sql
        run_script 8.AddFavoritesUniqueConstraint.sql
        run_script 9.SeedSystemUser.sql
        run_script 10.AddUserManagerStatus.sql
        run_script 11.CreateCategoriesTables.sql
        run_script 12.SeedCategories.sql
        run_script 13.MigrateCampingCategoryToGuid.sql
        echo 'Todos los scripts ejecutados exitosamente'
      "
    restart: "no"

  webapi:
    build:
      context: ../
      dockerfile: CampingAI.WebApi/Dockerfile
    container_name: campingai-webapi
    ports:
      - "32777:8080"
    restart: unless-stopped
    env_file:
      - path: secrets.docker.env
        required: false
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__CAMPING_AI_SqlServer=Server=sql-campingai,1433;Database=CAMPING_AI_DB;User Id=sa;Password=Pwd_12345!;TrustServerCertificate=true;Encrypt=true;
      - Jwt__Issuer=CampingAI
      - Jwt__Audience=CampingAI-Users
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - campingai-network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  campingai-mobile:
    build:
      context: ../CampingAI.Mobile
      dockerfile: Dockerfile
    container_name: campingai-mobile
    ports:
      - "8102:80"
    restart: unless-stopped
    depends_on:
      webapi:
        condition: service_healthy
    networks:
      - campingai-network

volumes:
  sqlserver_data:

networks:
  campingai-network:
    driver: bridge